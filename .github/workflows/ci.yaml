name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "gofmt needed on:"; echo "$out"; exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: build
        run: go build ./...

      - name: test
        run: |
          go install sigs.k8s.io/controller-runtime/tools/setup-envtest@release-0.24
          export KUBEBUILDER_ASSETS="$("$(go env GOPATH)/bin/setup-envtest" use 1.36.2 -p path)"
          go test ./... -coverprofile=cover.out

      - name: generated manifests up to date
        run: |
          make manifests generate
          git diff --exit-code -- config/crd config/rbac api \
            || { echo "generated files stale; run 'make manifests generate' and commit"; exit 1; }

      - name: kustomize build
        run: |
          make kustomize
          ./bin/kustomize build config/default > /dev/null
          ./bin/kustomize build config/default-webhook > /dev/null

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: docker build
        run: docker build -t ci-check .
