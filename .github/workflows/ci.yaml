name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "gofmt needed on:"; echo "$out"; exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: build
        run: go build ./...

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.6.0
          "$(go env GOPATH)/bin/govulncheck" ./...

      - name: test
        run: |
          go install sigs.k8s.io/controller-runtime/tools/setup-envtest@v0.24.1
          export KUBEBUILDER_ASSETS="$("$(go env GOPATH)/bin/setup-envtest" use 1.36.2 -p path)"
          go test ./... -coverprofile=cover.out

      - name: generated manifests up to date
        run: |
          make manifests generate
          git diff --exit-code -- config/crd config/rbac api \
            || { echo "generated files stale; run 'make manifests generate' and commit"; exit 1; }

      - name: kustomize build
        run: |
          make kustomize
          ./bin/kustomize build config/default > /dev/null
          ./bin/kustomize build config/default-webhook > /dev/null

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          cache: true

      - uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8.0.0
        with:
          version: v2.12.2

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          persist-credentials: false

      - name: docker build
        run: docker build -t ci-check .

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          cache: true

      - name: kind e2e
        run: make test-e2e
