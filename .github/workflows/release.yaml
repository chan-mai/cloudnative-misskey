name: Release

# タグpushでghcrへmulti-arch imageをpushし、cosign署名+provenance+SBOMを付与
# install manifestをReleaseに添付する。workflow_dispatchはpushなしのbuild検証のみ
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write # cosign keyless署名 + provenance attestationのOIDC
  attestations: write # attest-build-provenance

env:
  IMG: ghcr.io/${{ github.repository }}

jobs:
  release:
    runs-on: ubuntu-latest
    # 保護環境。GitHub側でrequired reviewers/tag制限を設定し、リリース公開に承認ゲートをかける
    environment: release
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          cache: true

      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # v3.10.1

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        if: github.ref_type == 'tag'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        id: build
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.ref_type == 'tag' }}
          # in-toto SLSA provenance + SBOMをimageへ添付
          provenance: mode=max
          sbom: true
          tags: |
            ${{ env.IMG }}:${{ github.ref_name }}
            ${{ env.IMG }}:latest

      - name: cosign sign
        # keyless署名(OIDC)。利用者は cosign verify で真正性を検証できる
        if: github.ref_type == 'tag'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMG}@${DIGEST}"

      - uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        if: github.ref_type == 'tag'
        with:
          subject-name: ${{ env.IMG }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        if: github.ref_type == 'tag'
        with:
          image: ${{ env.IMG }}@${{ steps.build.outputs.digest }}
          output-file: dist/sbom.spdx.json

      - name: build install manifests
        # manifestはdigest固定(tag@sha256:...)にし、タグ再pushでも既存installが影響されないようにする
        # workflow_dispatch(push無し)はdigestが出ないためtagのみで検証
        run: |
          make kustomize
          REF="${IMG}:${{ github.ref_name }}"
          if [ -n "${{ steps.build.outputs.digest }}" ]; then
            REF="${REF}@${{ steps.build.outputs.digest }}"
          fi
          cd config/manager && ../../bin/kustomize edit set image "controller=${REF}" && cd ../..
          mkdir -p dist
          ./bin/kustomize build config/default > dist/install.yaml
          ./bin/kustomize build config/default-webhook > dist/install-webhook.yaml

      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        if: github.ref_type == 'tag'
        with:
          generate_release_notes: true
          files: |
            dist/install.yaml
            dist/install-webhook.yaml
            dist/sbom.spdx.json
