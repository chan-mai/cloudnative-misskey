name: Release

# „āŅ„āįpush„Āßghcr„Āłmulti-arch image„āípush„Āó„ÄĀinstall manifest„āíRelease„Āęś∑ĽšĽė„Āô„āč
# workflow_dispatch„ĀĮpush„Ā™„Āó„Āģbuildś§úŤ®ľ„Āģ„ĀŅ
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  IMG: ghcr.io/${{ github.repository }}

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.ref_type == 'tag'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.ref_type == 'tag' }}
          tags: |
            ${{ env.IMG }}:${{ github.ref_name }}
            ${{ env.IMG }}:latest

      - name: build install manifests
        run: |
          make kustomize
          cd config/manager && ../../bin/kustomize edit set image controller=${IMG}:${{ github.ref_name }} && cd ../..
          mkdir -p dist
          ./bin/kustomize build config/default > dist/install.yaml
          ./bin/kustomize build config/default-webhook > dist/install-webhook.yaml

      - uses: softprops/action-gh-release@v2
        if: github.ref_type == 'tag'
        with:
          generate_release_notes: true
          files: |
            dist/install.yaml
            dist/install-webhook.yaml
