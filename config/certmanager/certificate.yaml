apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: selfsigned-issuer
  namespace: cloudnative-misskey-system
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: serving-cert
  namespace: cloudnative-misskey-system
spec:
  dnsNames:
    - webhook-service.cloudnative-misskey-system.svc
    - webhook-service.cloudnative-misskey-system.svc.cluster.local
  # 明示的な有効期間と鍵ローテーション(既定90日/鍵再利用に依存しない)
  duration: 2160h # 90d
  renewBefore: 360h # 15d
  privateKey:
    rotationPolicy: Always
  issuerRef:
    kind: Issuer
    name: selfsigned-issuer
  secretName: webhook-server-cert
