# Full instance: one CR provisions app + worker + proxy + Redis + MeiliSearch +
# a CNPG PostgreSQL cluster + Ingress. MeiliSearch is the default search backend.
apiVersion: cloudnative-misskey.dev/v1beta1
kind: Misskey
metadata:
  name: example
spec:
  url: https://misskey.example.com/
  image: misskey/misskey:2026.6.0
  # aidx is Misskey's current default. Immutable after init.
  idGenerationMethod: aidx

  # Initial-setup admin password. With no secretRef the operator generates one
  # into the Secret "example-setup" (key SETUP_PASSWORD). Retrieve it with:
  #   kubectl get secret example-setup -o jsonpath='{.data.SETUP_PASSWORD}' | base64 -d
  setupPassword: {}

  app:
    replicas: 3
    resources:
      requests: { cpu: 100m, memory: 400Mi }
      limits: { memory: 800Mi }

  worker:
    replicas: 2
    resources:
      requests: { cpu: 100m, memory: 500Mi }
      limits: { memory: 1Gi }

  # Job-queue tuning written to default.yml. Unset keys use Misskey's defaults.
  performance:
    deliverJobConcurrency: 128
    inboxJobConcurrency: 16
    deliverJobPerSec: 128
    inboxJobPerSec: 32

  search:
    provider: meilisearch
    meilisearch:
      storage: 10Gi
      scope: local
      # index defaults to the sanitized host of spec.url.
      # A master key is generated into the Secret "example-meilisearch" if unset.
      resources:
        requests: { cpu: 100m, memory: 256Mi }
        limits: { memory: 1Gi }

  redis:
    storage: 2Gi
    maxMemory: 400mb
    resources:
      requests: { cpu: 50m, memory: 256Mi }
      limits: { memory: 512Mi }

  postgres:
    instances: 2
    storage: 20Gi
    database: misskey
    owner: misskey
    resources:
      requests: { cpu: 200m, memory: 768Mi }
      limits: { memory: 2Gi }
    # Optional off-site backups to any S3-compatible object store.
    backup:
      destinationPath: s3://my-bucket/misskey/backups
      endpointURL: https://s3.example.com
      retentionPolicy: 30d
      schedule: "0 0 3 * * *"
      # serverName: restored-db  # recoveryと同一destinationPathを使う場合は必須(別名にする)
      s3Credentials:
        accessKeyId:
          name: s3-credentials
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: s3-credentials
          key: SECRET_ACCESS_KEY
    # 既存バックアップからのDB復元(DR/インスタンス移行)。CR作成時のみ有効・immutable
    # recovery:
    #   source:
    #     destinationPath: s3://my-bucket/misskey/backups
    #     endpointURL: https://s3.example.com
    #     serverName: old-instance-db  # 復元元クラスタのフォルダ名(通常"<旧CR名>-db")
    #     s3Credentials:
    #       accessKeyId:
    #         name: s3-credentials
    #         key: ACCESS_KEY_ID
    #       secretAccessKey:
    #         name: s3-credentials
    #         key: SECRET_ACCESS_KEY
    #   targetTime: "2026-07-15T00:00:00+09:00"  # 任意(PITR), 省略で最新WALまで
    # 稼働中の外部PostgreSQLからの論理インポート(recoveryと排他, CR作成時のみ有効)
    # import:
    #   source:
    #     host: old-server.example.internal
    #     database: misskey
    #     user: misskey
    #     passwordSecret: { name: src-db-secret, key: password }

  proxy:
    enabled: true
    maintenance:
      enabled: true

  ingress:
    enabled: true
    className: nginx
    host: misskey.example.com
