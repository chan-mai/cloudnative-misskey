---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: misskeys.cloudnative-misskey.dev
spec:
  group: cloudnative-misskey.dev
  names:
    kind: Misskey
    listKind: MisskeyList
    plural: misskeys
    shortNames:
    - mk
    singular: misskey
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.url
      name: URL
      type: string
    - jsonPath: .spec.search.provider
      name: Search
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    - jsonPath: .status.databaseHost
      name: Database
      priority: 1
      type: string
    - jsonPath: .status.backup.lastSuccessfulBackup
      name: LastBackup
      priority: 1
      type: date
    - jsonPath: .status.image
      name: Image
      priority: 1
      type: string
    - jsonPath: .status.searchIndex
      name: Index
      priority: 1
      type: string
    name: v1beta1
    schema:
      openAPIV3Schema:
        description: Misskey is the Schema for the misskeys API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: MisskeySpec defines the desired state of a Misskey instance.
            properties:
              app:
                description: App configures the web/API server Deployment (runs with
                  MK_ONLY_SERVER).
                properties:
                  autoscaling:
                    description: |-
                      Autoscaling replaces the static Replicas with a HorizontalPodAutoscaler
                      (CPU/memory, needs metrics-server) or, when rps is set, a KEDA
                      ScaledObject on the proxy's request rate.
                    properties:
                      maxReplicas:
                        description: MaxReplicas is the upper bound.
                        format: int32
                        minimum: 1
                        type: integer
                      minReplicas:
                        description: |-
                          MinReplicas is the lower bound. Default 1; use >=2 so the PodDisruptionBudget
                          (maxUnavailable=1) still allows node drains.
                        format: int32
                        minimum: 0
                        type: integer
                      rps:
                        description: |-
                          RPS, when set, switches the mechanism to a KEDA ScaledObject that scales
                          on the proxy's request rate via a prometheus trigger. Requires KEDA and
                          monitoring.enabled (or an equivalent scrape) so the Caddy metrics are
                          collected.
                        properties:
                          query:
                            description: Query overrides the default PromQL (this
                              instance's total proxy RPS).
                            type: string
                          serverAddress:
                            description: |-
                              ServerAddress is the Prometheus endpoint KEDA queries, e.g.
                              http://prometheus.monitoring:9090.
                            maxLength: 2048
                            minLength: 1
                            type: string
                          targetRPS:
                            description: TargetRPS is the request rate each replica
                              should absorb.
                            format: int32
                            minimum: 1
                            type: integer
                        required:
                        - serverAddress
                        - targetRPS
                        type: object
                      targetCPUUtilizationPercentage:
                        description: TargetCPUUtilizationPercentage adds a CPU utilization
                          metric. Unset omits it.
                        format: int32
                        type: integer
                      targetMemoryUtilizationPercentage:
                        description: TargetMemoryUtilizationPercentage adds a memory
                          utilization metric. Unset omits it.
                        format: int32
                        type: integer
                    required:
                    - maxReplicas
                    type: object
                    x-kubernetes-validations:
                    - message: minReplicas must not exceed maxReplicas
                      rule: '!has(self.minReplicas) || self.minReplicas <= self.maxReplicas'
                  nodeSelector:
                    additionalProperties:
                      type: string
                    description: NodeSelector constrains scheduling to matching nodes.
                    type: object
                  replicas:
                    description: Replicas is the desired number of pods.
                    format: int32
                    minimum: 0
                    type: integer
                  resources:
                    description: Resources describes compute requests/limits for the
                      container.
                    properties:
                      claims:
                        description: |-
                          Claims lists the names of resources, defined in spec.resourceClaims,
                          that are used by this container.

                          This field depends on the
                          DynamicResourceAllocation feature gate.

                          This field is immutable. It can only be set for containers.
                        items:
                          description: ResourceClaim references one entry in PodSpec.ResourceClaims.
                          properties:
                            name:
                              description: |-
                                Name must match the name of one entry in pod.spec.resourceClaims of
                                the Pod where this field is used. It makes that resource available
                                inside a container.
                              type: string
                            request:
                              description: |-
                                Request is the name chosen for a request in the referenced claim.
                                If empty, everything from the claim is made available, otherwise
                                only the result of this request.
                              type: string
                          required:
                          - name
                          type: object
                        type: array
                        x-kubernetes-list-map-keys:
                        - name
                        x-kubernetes-list-type: map
                      limits:
                        additionalProperties:
                          anyOf:
                          - type: integer
                          - type: string
                          pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                          x-kubernetes-int-or-string: true
                        description: |-
                          Limits describes the maximum amount of compute resources allowed.
                          More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                        type: object
                      requests:
                        additionalProperties:
                          anyOf:
                          - type: integer
                          - type: string
                          pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                          x-kubernetes-int-or-string: true
                        description: |-
                          Requests describes the minimum amount of compute resources required.
                          If Requests is omitted for a container, it defaults to Limits if that is explicitly specified,
                          otherwise to an implementation-defined value. Requests cannot exceed Limits.
                          More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                        type: object
                    type: object
                  tolerations:
                    description: Tolerations allow scheduling onto tainted nodes.
                    items:
                      description: |-
                        The pod this Toleration is attached to tolerates any taint that matches
                        the triple <key,value,effect> using the matching operator <operator>.
                      properties:
                        effect:
                          description: |-
                            Effect indicates the taint effect to match. Empty means match all taint effects.
                            When specified, allowed values are NoSchedule, PreferNoSchedule and NoExecute.
                          type: string
                        key:
                          description: |-
                            Key is the taint key that the toleration applies to. Empty means match all taint keys.
                            If the key is empty, operator must be Exists; this combination means to match all values and all keys.
                          type: string
                        operator:
                          description: |-
                            Operator represents a key's relationship to the value.
                            Valid operators are Exists, Equal, Lt, and Gt. Defaults to Equal.
                            Exists is equivalent to wildcard for value, so that a pod can
                            tolerate all taints of a particular category.
                            Lt and Gt perform numeric comparisons (requires feature gate TaintTolerationComparisonOperators).
                          type: string
                        tolerationSeconds:
                          description: |-
                            TolerationSeconds represents the period of time the toleration (which must be
                            of effect NoExecute, otherwise this field is ignored) tolerates the taint. By default,
                            it is not set, which means tolerate the taint forever (do not evict). Zero and
                            negative values will be treated as 0 (evict immediately) by the system.
                          format: int64
                          type: integer
                        value:
                          description: |-
                            Value is the taint value the toleration matches to.
                            If the operator is Exists, the value should be empty, otherwise just a regular string.
                          type: string
                      type: object
                    type: array
                type: object
              deletionPolicy:
                default: Retain
                description: |-
                  DeletionPolicy controls what happens to data-bearing resources (the CNPG
                  cluster, Redis/MeiliSearch StatefulSets and generated key Secrets) when this
                  Misskey is deleted. Retain (default) orphans them so the data survives;
                  recreating the Misskey with the same name re-adopts them. Delete
                  garbage-collects everything via owner references (destroys the database).
                enum:
                - Delete
                - Retain
                type: string
              extraConfig:
                description: |-
                  ExtraConfig is raw YAML appended verbatim to the generated default.yml.
                  Use it for settings not modeled by this CRD.
                maxLength: 65536
                type: string
              files:
                description: |-
                  Files tunes media/file handling written to default.yml (max upload size,
                  remote-file proxying, media proxy).
                properties:
                  maxFileSize:
                    description: MaxFileSize is the maximum upload size in bytes (default.yml
                      maxFileSize).
                    format: int64
                    minimum: 1
                    type: integer
                  mediaProxy:
                    description: |-
                      MediaProxy is the URL of an external media proxy for remote files
                      (default.yml mediaProxy).
                    type: string
                  proxyRemoteFiles:
                    description: |-
                      ProxyRemoteFiles proxies remote files through this server (default.yml
                      proxyRemoteFiles). Defaults to true when unset.
                    type: boolean
                type: object
              idGenerationMethod:
                default: aidx
                description: |-
                  IDGenerationMethod is Misskey's note/user id format. Immutable after the
                  instance has been initialized; when migrating an existing database, set it
                  to the value the database was created with.
                enum:
                - aid
                - aidx
                - meid
                - ulid
                - objectid
                type: string
                x-kubernetes-validations:
                - message: idGenerationMethod is immutable
                  rule: self == oldSelf
              image:
                description: |-
                  Image is the Misskey server container image. The app and worker share it.
                  Exactly one of image or imageFrom must be set.
                type: string
              imageFrom:
                description: |-
                  ImageFrom resolves the image from a MisskeyChannel, enabling staged
                  fleet-wide rollouts. Exactly one of image or imageFrom must be set.
                properties:
                  channel:
                    description: Channel is the name of the cluster-scoped MisskeyChannel
                      to follow.
                    maxLength: 253
                    minLength: 1
                    type: string
                required:
                - channel
                type: object
              imagePullSecrets:
                description: ImagePullSecrets used to pull the Misskey image.
                items:
                  description: |-
                    LocalObjectReference contains enough information to let you locate the
                    referenced object inside the same namespace.
                  properties:
                    name:
                      default: ""
                      description: |-
                        Name of the referent.
                        This field is effectively required, but due to backwards compatibility is
                        allowed to be empty. Instances of this type with an empty value here are
                        almost certainly wrong.
                        More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                      type: string
                  type: object
                  x-kubernetes-map-type: atomic
                type: array
              ingress:
                description: |-
                  Ingress configures the Ingress exposing the proxy (or the app when the
                  proxy is disabled).
                properties:
                  annotations:
                    additionalProperties:
                      type: string
                    description: |-
                      Annotations added to the Ingress object. Operator-managed annotations
                      (cert-manager, proxy-body-size) always win, and known privilege-escalating
                      keys (nginx *-snippet, auth-url, ...) are dropped by the controller.
                    maxProperties: 32
                    type: object
                    x-kubernetes-validations:
                    - message: ingress annotation values must be at most 4096 characters
                      rule: self.all(k, size(self[k]) <= 4096)
                  className:
                    default: nginx
                    description: ClassName sets ingressClassName, e.g. nginx or traefik.
                    type: string
                  enabled:
                    default: true
                    description: Enabled toggles Ingress creation.
                    type: boolean
                  host:
                    description: |-
                      Host overrides the ingress host. Defaults to the host part of spec.url.
                      Constrained to a DNS-1123 subdomain to prevent host takeover via malformed values.
                    maxLength: 253
                    pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                    type: string
                  issuerRef:
                    description: |-
                      IssuerRef points at a cert-manager Issuer/ClusterIssuer. The operator
                      stamps the cert-manager annotation and a TLS block (secret "<name>-tls"
                      unless tlsSecretName overrides it) so the certificate is provisioned
                      automatically. Requires cert-manager in the cluster.
                    properties:
                      kind:
                        default: ClusterIssuer
                        description: Kind of the issuer.
                        enum:
                        - Issuer
                        - ClusterIssuer
                        type: string
                      name:
                        description: Name of the issuer.
                        maxLength: 253
                        minLength: 1
                        type: string
                    required:
                    - name
                    type: object
                  tlsSecretName:
                    description: TLSSecretName enables a TLS block referencing the
                      named secret. Optional.
                    type: string
                type: object
              migration:
                description: Migration configures the schema-migration Job behavior.
                properties:
                  createIndexConcurrently:
                    description: |-
                      CreateIndexConcurrently sets MISSKEY_MIGRATION_CREATE_INDEX_CONCURRENTLY=1 on the
                      migration Job so index-creating migrations use CREATE INDEX CONCURRENTLY (which
                      does not block writes) instead of a locking CREATE INDEX, keeping deploys
                      non-blocking on large tables such as note. Default false (opt-in), matching
                      Misskey's upstream default of running all migrations in a single atomic
                      transaction. Tradeoffs when true: per-migration transactions (not one atomic
                      batch), slower index builds, and a failed concurrent build can leave an invalid
                      index needing manual cleanup.
                    type: boolean
                  preBackup:
                    description: |-
                      PreBackup gates each new migration Job on an on-demand CNPG Backup of
                      the database, so a failed one-way migration can be rolled back by
                      restoring a new instance via postgres.recovery. Requires managed
                      PostgreSQL with postgres.backup configured; otherwise it is a no-op.
                    type: boolean
                type: object
              monitoring:
                description: |-
                  Monitoring generates Prometheus ServiceMonitor/PodMonitor for the instance's
                  managed backends (PostgreSQL/Redis/MeiliSearch).
                properties:
                  enabled:
                    description: |-
                      Enabled generates ServiceMonitor/PodMonitor and turns on each backend's
                      metrics endpoint (CNPG :9187, a redis_exporter sidecar, MeiliSearch metrics).
                    type: boolean
                  interval:
                    default: 30s
                    description: Interval is the scrape interval as a Prometheus duration,
                      e.g. 30s, 1m.
                    pattern: ^([0-9]+(ms|s|m|h|d|w|y))+$
                    type: string
                  labels:
                    additionalProperties:
                      type: string
                    description: |-
                      Labels are added to the generated ServiceMonitor/PodMonitor so your Prometheus
                      serviceMonitorSelector/podMonitorSelector matches them (e.g. release: kps).
                    type: object
                  redisExporterImage:
                    description: |-
                      RedisExporterImage is the redis_exporter sidecar image for standalone Redis.
                      Defaults on the operator side (not persisted into the CR), so operator
                      upgrades can evolve it fleet-wide.
                    type: string
                  rules:
                    description: |-
                      Rules generates a PrometheusRule with baseline alerts (proxy 5xx ratio,
                      backup staleness when postgres.backup is set). On by default while
                      monitoring is enabled.
                    properties:
                      backupMaxAge:
                        default: 48h
                        description: |-
                          BackupMaxAge is how old the latest base backup may become before the
                          MisskeyBackupStale alert fires.
                        type: string
                      enabled:
                        default: true
                        description: Enabled toggles the PrometheusRule generation.
                        type: boolean
                    type: object
                type: object
              network:
                description: |-
                  Network groups this instance's NetworkPolicy controls (ingress isolation and
                  opt-in egress isolation).
                properties:
                  egressIsolation:
                    description: EgressIsolation configures egress isolation (opt-in).
                      See EgressIsolationSpec.
                    properties:
                      allowedNamespaces:
                        description: |-
                          AllowedNamespaces are additional egress-permitted namespace names on any
                          port, e.g. an in-cluster SMTP relay or object store.
                        items:
                          type: string
                        type: array
                      dnsNamespace:
                        default: kube-system
                        description: |-
                          DNSNamespace runs the cluster DNS (CoreDNS), allowed on :53. Defaults to
                          kube-system.
                        type: string
                      enabled:
                        description: Enabled creates the egress NetworkPolicies. Default
                          false (opt-in).
                        type: boolean
                    type: object
                  isolation:
                    description: |-
                      Isolation configures the ingress NetworkPolicy for this instance's backend
                      pods (app/worker/redis/meilisearch).
                    properties:
                      allowedNamespaces:
                        description: |-
                          AllowedNamespaces are namespace names (matched by the
                          kubernetes.io/metadata.name label) permitted to reach the isolated backend
                          pods in addition to intra-instance traffic, e.g. a monitoring namespace for
                          Prometheus scraping.
                        items:
                          type: string
                        type: array
                      enabled:
                        default: true
                        description: Enabled creates the isolation NetworkPolicy.
                          Default true.
                        type: boolean
                    type: object
                type: object
              objectStorage:
                description: |-
                  ObjectStorage configures S3/R2-compatible media storage. Misskey stores this
                  in the DB meta table (not default.yml), so the operator writes it via a
                  one-shot Job after migration. Opt-in. Existing uploads are not migrated.
                properties:
                  autoConfigure:
                    default: true
                    description: |-
                      AutoConfigure lets the operator write the settings into the meta table via
                      a Job. Default true. Set false to declare the settings without the operator
                      touching the database (apply them yourself).
                    type: boolean
                  baseUrl:
                    description: |-
                      BaseURL is the public base URL used to build file URLs, e.g. a bucket
                      public domain. Required for R2 (its S3 API endpoint is not public).
                    pattern: ^https?://.+
                    type: string
                  bucket:
                    description: Bucket is the S3 bucket name.
                    minLength: 1
                    type: string
                  columnNames:
                    description: |-
                      ColumnNames overrides the meta table column names, for Misskey forks or
                      older versions whose columns differ from upstream.
                    properties:
                      accessKey:
                        maxLength: 63
                        pattern: ^[A-Za-z_][A-Za-z0-9_]*$
                        type: string
                      baseUrl:
                        maxLength: 63
                        pattern: ^[A-Za-z_][A-Za-z0-9_]*$
                        type: string
                      bucket:
                        maxLength: 63
                        pattern: ^[A-Za-z_][A-Za-z0-9_]*$
                        type: string
                      endpoint:
                        maxLength: 63
                        pattern: ^[A-Za-z_][A-Za-z0-9_]*$
                        type: string
                      port:
                        maxLength: 63
                        pattern: ^[A-Za-z_][A-Za-z0-9_]*$
                        type: string
                      prefix:
                        maxLength: 63
                        pattern: ^[A-Za-z_][A-Za-z0-9_]*$
                        type: string
                      region:
                        maxLength: 63
                        pattern: ^[A-Za-z_][A-Za-z0-9_]*$
                        type: string
                      s3ForcePathStyle:
                        maxLength: 63
                        pattern: ^[A-Za-z_][A-Za-z0-9_]*$
                        type: string
                      secretKey:
                        maxLength: 63
                        pattern: ^[A-Za-z_][A-Za-z0-9_]*$
                        type: string
                      setPublicRead:
                        maxLength: 63
                        pattern: ^[A-Za-z_][A-Za-z0-9_]*$
                        type: string
                      useObjectStorage:
                        maxLength: 63
                        pattern: ^[A-Za-z_][A-Za-z0-9_]*$
                        type: string
                      useProxy:
                        maxLength: 63
                        pattern: ^[A-Za-z_][A-Za-z0-9_]*$
                        type: string
                      useSSL:
                        maxLength: 63
                        pattern: ^[A-Za-z_][A-Za-z0-9_]*$
                        type: string
                    type: object
                  credentials:
                    description: Credentials references the S3 access key id and secret
                      access key.
                    properties:
                      accessKeyId:
                        description: AccessKeyID references the access key id.
                        properties:
                          key:
                            description: The key of the secret to select from.  Must
                              be a valid secret key.
                            type: string
                          name:
                            default: ""
                            description: |-
                              Name of the referent.
                              This field is effectively required, but due to backwards compatibility is
                              allowed to be empty. Instances of this type with an empty value here are
                              almost certainly wrong.
                              More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                            type: string
                          optional:
                            description: Specify whether the Secret or its key must
                              be defined
                            type: boolean
                        required:
                        - key
                        type: object
                        x-kubernetes-map-type: atomic
                      secretAccessKey:
                        description: SecretAccessKey references the secret access
                          key.
                        properties:
                          key:
                            description: The key of the secret to select from.  Must
                              be a valid secret key.
                            type: string
                          name:
                            default: ""
                            description: |-
                              Name of the referent.
                              This field is effectively required, but due to backwards compatibility is
                              allowed to be empty. Instances of this type with an empty value here are
                              almost certainly wrong.
                              More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                            type: string
                          optional:
                            description: Specify whether the Secret or its key must
                              be defined
                            type: boolean
                        required:
                        - key
                        type: object
                        x-kubernetes-map-type: atomic
                    required:
                    - accessKeyId
                    - secretAccessKey
                    type: object
                  endpoint:
                    description: |-
                      Endpoint is the S3 API endpoint host without a scheme, e.g.
                      s3.example.com or <accountid>.r2.cloudflarestorage.com. The scheme is
                      derived from useSSL.
                    pattern: ^[^/]*$
                    type: string
                  extraColumns:
                    additionalProperties:
                      type: string
                    description: |-
                      ExtraColumns writes additional meta columns (fork-specific) as plaintext
                      values keyed by column name. Secrets belong in credentials, not here.
                    type: object
                  image:
                    description: |-
                      Image is the psql-capable image for the meta-write Job. Defaults on the
                      operator side to the CNPG PostgreSQL image, which ships psql 16+
                      (required for \getenv).
                    type: string
                  port:
                    description: Port overrides the endpoint port. Omit for the scheme
                      default.
                    format: int32
                    maximum: 65535
                    minimum: 1
                    type: integer
                  prefix:
                    description: Prefix is an optional key prefix for stored objects.
                    type: string
                  region:
                    default: us-east-1
                    description: |-
                      Region is the S3 region. Defaults to us-east-1 for stores with no region
                      concept (e.g. MinIO); Cloudflare R2 uses "auto".
                    type: string
                  s3ForcePathStyle:
                    default: true
                    description: S3ForcePathStyle uses path-style requests against
                      the endpoint. Default true.
                    type: boolean
                  setPublicRead:
                    default: false
                    description: |-
                      SetPublicRead sets a public-read ACL on upload. Default false. Must stay
                      false for Cloudflare R2, which does not support object ACLs.
                    type: boolean
                  useProxy:
                    default: true
                    description: UseProxy routes S3 traffic through Misskey's configured
                      HTTP proxy. Default true.
                    type: boolean
                  useSSL:
                    default: true
                    description: UseSSL talks to the endpoint over https. Default
                      true.
                    type: boolean
                required:
                - bucket
                - credentials
                type: object
                x-kubernetes-validations:
                - message: extraColumns keys must be valid SQL identifiers
                  rule: '!has(self.extraColumns) || self.extraColumns.all(k, k.matches(''^[A-Za-z_][A-Za-z0-9_]*$''))'
              outboundProxy:
                description: |-
                  OutboundProxy routes Misskey's outgoing HTTP(S)/SMTP through a forward proxy
                  (default.yml proxy/proxySmtp/proxyBypassHosts). Distinct from spec.proxy,
                  which is the inbound Caddy reverse proxy.
                properties:
                  bypassHosts:
                    description: |-
                      BypassHosts are hosts reached directly, bypassing the proxy (default.yml
                      proxyBypassHosts), e.g. captcha or translation endpoints.
                    items:
                      type: string
                    type: array
                  http:
                    description: |-
                      HTTP is the forward proxy URL for outgoing HTTP(S), e.g. http://proxy:3128
                      (default.yml proxy).
                    type: string
                  smtp:
                    description: SMTP is a separate forward proxy URL for outgoing
                      SMTP (default.yml proxySmtp).
                    type: string
                type: object
              performance:
                description: |-
                  Performance tunes the job-queue processor via default.yml. All fields are
                  optional; unset ones fall back to Misskey's own defaults (not written out).
                properties:
                  deliverJobConcurrency:
                    description: DeliverJobConcurrency caps concurrent activity deliveries
                      per worker.
                    format: int32
                    minimum: 1
                    type: integer
                  deliverJobMaxAttempts:
                    description: DeliverJobMaxAttempts is the retry count for a failed
                      deliver job.
                    format: int32
                    minimum: 1
                    type: integer
                  deliverJobPerSec:
                    description: DeliverJobPerSec rate-limits enqueued deliver jobs
                      per second.
                    format: int32
                    minimum: 1
                    type: integer
                  inboxJobConcurrency:
                    description: InboxJobConcurrency caps concurrent inbox (received
                      activity) processing per worker.
                    format: int32
                    minimum: 1
                    type: integer
                  inboxJobMaxAttempts:
                    description: InboxJobMaxAttempts is the retry count for a failed
                      inbox job.
                    format: int32
                    minimum: 1
                    type: integer
