# Lets the manager delegate metrics-endpoint authn/authz to the apiserver
# (TokenReview / SubjectAccessReview), so --metrics-secure can gate access.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cloud-native-misskey-metrics-auth-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
  - kind: ServiceAccount
    name: controller-manager
    namespace: cloud-native-misskey-system
