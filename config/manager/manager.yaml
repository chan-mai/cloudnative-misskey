apiVersion: v1
kind: Namespace
metadata:
  name: cloudnative-misskey-system
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: cloudnative-misskey
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
  namespace: cloudnative-misskey-system
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: cloudnative-misskey
spec:
  replicas: 1
  selector:
    matchLabels:
      control-plane: controller-manager
  template:
    metadata:
      labels:
        control-plane: controller-manager
    spec:
      serviceAccountName: controller-manager
      terminationGracePeriodSeconds: 10
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: manager
          image: controller:latest
          command: ["/manager"]
          args:
            - --leader-elect
            - --health-probe-bind-address=:8081
            - --metrics-bind-address=:8443
            # watchしない外部CRD(CNPG/redis-operator/KEDA)のドリフト是正の定期requeue間隔
            - --drift-resync-interval=3m
          env:
            # webhookはcert必須のため既定off。config/default-webhookのpatchがtrueへ上書き
            - name: ENABLE_WEBHOOKS
              value: "false"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: "1"
              memory: 128Mi
