apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
  namespace: cloudnative-misskey-system
spec:
  template:
    spec:
      containers:
        - name: manager
          env:
            - name: ENABLE_WEBHOOKS
              value: "true"
          ports:
            - containerPort: 9443
              name: webhook-server
              protocol: TCP
          volumeMounts:
            - name: cert
              mountPath: /tmp/k8s-webhook-server/serving-certs
              readOnly: true
      volumes:
        - name: cert
          secret:
            secretName: webhook-server-cert
            defaultMode: 420
